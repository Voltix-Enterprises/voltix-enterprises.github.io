<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Version</title>
  <link rel="icon" href="favicon.ico?refresh=latest" type="image/x-icon" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 1rem;
    }

    button {
      display: block;
      width: 200px;
      margin: 1rem auto;
      padding: 1rem;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #0077cc;
      color: white;
      transition: background 0.2s;
    }

    button:hover {
      background: #005fa3;
    }

    .ie {
      background: #444;
    }

    .ie:hover {
      background: #222;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Select Version</h1>
    <p>Please choose which version of the site to load.</p>

    <button onclick="location.href='modern.html'">Modern Version</button>
    <button class="ie" onclick="location.href='stripped.html'">IE11 Version</button>
  </div>
</body>
</html>
